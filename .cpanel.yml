---
deployment:
  tasks:
    - export DEPLOYPATH="/home/$(whoami)/public_html/jeanpierreboutros.com/"
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -R index.html styles.css main.js robots.txt sitemap.xml favicon.png jpb-monogram.png jpb-logo-lockup.png "$DEPLOYPATH"
    - /bin/cp -R photos "$DEPLOYPATH"
